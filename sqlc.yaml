version: "2"
sql:
  - engine: "postgresql"
    queries: "./query/*"
    schema: "./db/migrations"
    gen:
      go:
        package: "db"
        out: "./db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
overrides:
  go:
    rename:
      original_url: "OriginalURL"
      short_url: "ShortURL"
      ip: "IP"
